<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぷにぷにバニー・ボックス</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eceff1; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #37474f; pointer-events: none; z-index: 10; }
        #score { font-size: 50px; font-weight: bold; }
        #gameover { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; border: 5px solid #81d4fa;
        }
        button { padding: 12px 24px; font-size: 20px; cursor: pointer; border: none; background: #81d4fa; color: white; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
        <div style="font-size: 14px;">グレーは鉄、オレンジは爆弾バニー！</div>
    </div>
    <div id="gameover">
        <h1>あふれちゃった！</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()">もういちど挑戦</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script>
        const WORLD_W = 400;
        const WORLD_H = 700;
        const BOX_TOP = 200; 
        const COLORS = [0xFFF9C4, 0xF8BBD0, 0xB3E5FC, 0xC8E6C9, 0x78909C, 0xFF7043];
        
        let score = 0;
        let isGameOver = false;
        let currentPuni = null;
        let puniList = [];
        let canInput = true;

        const engine = Matter.Engine.create();
        const world = engine.world;
        
        const ground = Matter.Bodies.rectangle(200, WORLD_H, 320, 40, { isStatic: true, friction: 0.5 });
        const leftWall = Matter.Bodies.rectangle(40, 450, 20, 500, { isStatic: true, friction: 0.5 });
        const rightWall = Matter.Bodies.rectangle(360, 450, 20, 500, { isStatic: true, friction: 0.5 });
        Matter.Composite.add(world, [ground, leftWall, rightWall]);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(200, 600, 300);
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));
        camera.position.set(200, 400, 650);
        camera.lookAt(200, 350, 0);

        const boxGeo = new THREE.BoxGeometry(320, 500, 100);
        const boxMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.BackSide });
        const boxV = new THREE.Mesh(boxGeo, boxMat);
        boxV.position.set(200, WORLD_H - 250 - 20, -10);
        scene.add(boxV);

        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(40, WORLD_H - BOX_TOP, 10), new THREE.Vector3(360, WORLD_H - BOX_TOP, 10)]);
        scene.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xff4444 })));

        function createBunnyModel(type) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: COLORS[type] });
            
            // 顔
            const face = new THREE.Mesh(new THREE.SphereGeometry(30, 24, 24), mat);
            face.scale.y = 0.9; 
            group.add(face);
            
            // オリジナルの長い耳
            const earGeo = new THREE.SphereGeometry(10, 12, 12);
            const el = new THREE.Mesh(earGeo, mat); el.position.set(-14, 35, 0); el.scale.set(0.9, 2.8, 0.7); group.add(el);
            const er = new THREE.Mesh(earGeo, mat); er.position.set(14, 35, 0); er.scale.set(0.9, 2.8, 0.7); group.add(er);
            
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            if(type === 5) { // 爆弾顔
                const eyeLineMat = new THREE.LineBasicMaterial({color: 0x000000, linewidth: 2});
                const eyeL = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-15,10,26), new THREE.Vector3(-5,5,26), new THREE.Vector3(-15,0,26), new THREE.Vector3(-5,5,26)]), eyeLineMat);
                group.add(eyeL);
            } else {
                const e1 = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), eyeMat); e1.position.set(-10, 5, 25); group.add(e1);
                const e2 = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), eyeMat); e2.position.set(10, 5, 25); group.add(e2);
                
                // かわいい口 (v)
                const mouthMat = new THREE.LineBasicMaterial({ color: 0x222222 });
                const mouthGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-4, -5, 26), new THREE.Vector3(0, -8, 26), new THREE.Vector3(4, -5, 26)
                ]);
                group.add(new THREE.Line(mouthGeo, mouthMat));
            }
            scene.add(group);
            return group;
        }

        function prepareNext() {
            if (isGameOver) return;
            canInput = true;
            let type = Math.floor(Math.random() * 4);
            const rand = Math.random();
            if(rand < 0.1) type = 4; // 鉄
            else if(rand < 0.2) type = 5; // 爆弾

            currentPuni = { visual: createBunnyModel(type), type: type, x: 200, y: 70 };
            currentPuni.visual.position.set(currentPuni.x, WORLD_H - currentPuni.y, 0);
        }

        function drop() {
            if (!canInput || isGameOver) return;
            canInput = false;
            
            const isIron = currentPuni.type === 4;
            const body = Matter.Bodies.circle(currentPuni.x, currentPuni.y, 30, {
                restitution: isIron ? 0.1 : 0.4, 
                friction: 0.1, 
                density: isIron ? 0.01 : 0.001,
                label: 'puni'
            });
            body.puniType = currentPuni.type;
            
            puniList.push({ body, visual: currentPuni.visual, type: currentPuni.type });
            Matter.Composite.add(world, body);
            currentPuni = null;
            setTimeout(prepareNext, 800);
        }

        function animate() {
            if (!isGameOver) {
                Matter.Engine.update(engine);
                checkLogic();
            }
            puniList.forEach(m => {
                m.visual.position.x = m.body.position.x;
                m.visual.position.y = WORLD_H - m.body.position.y;
                m.visual.rotation.z = -m.body.angle;
                const s = 1 + Math.min(m.body.speed * 0.01, 0.1);
                m.visual.scale.set(2-s, s, 1);
            });
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        function checkLogic() {
            let toRemove = new Set();
            let explode = false;

            puniList.forEach(p1 => {
                if(p1.type === 4) return;
                let connected = [p1];
                let stack = [p1];
                let visited = new Set([p1.body.id]);
                while (stack.length > 0) {
                    let curr = stack.pop();
                    puniList.forEach(p2 => {
                        if (!visited.has(p2.body.id) && p1.type === p2.type) {
                            if (Matter.Vector.magnitude(Matter.Vector.sub(curr.body.position, p2.body.position)) < 75) {
                                visited.add(p2.body.id); connected.push(p2); stack.push(p2);
                            }
                        }
                    });
                }
                if (connected.length >= 3) {
                    connected.forEach(p => {
                        toRemove.add(p);
                        if(p.type === 5) explode = true;
                    });
                }
            });

            if(explode) {
                const bomb = Array.from(toRemove).find(p => p.type === 5);
                if(bomb) {
                    const bombPos = bomb.body.position;
                    puniList.forEach(p => {
                        const dist = Matter.Vector.magnitude(Matter.Vector.sub(bombPos, p.body.position));
                        if(dist < 150) toRemove.add(p);
                    });
                    score += 50;
                }
            }

            toRemove.forEach(p => {
                scene.remove(p.visual);
                Matter.Composite.remove(world, p.body);
                puniList = puniList.filter(item => item !== p);
                score += 10;
            });
            document.getElementById('score').innerText = score;

            puniList.forEach(p => {
                if (p.body.position.y < BOX_TOP && p.body.speed < 0.1 && !canInput) {
                    isGameOver = true;
                    document.getElementById('gameover').style.display = 'block';
                    document.getElementById('final-score').innerText = "Score: " + score;
                }
            });
        }

        const handleMove = (e) => {
            if (!canInput || !currentPuni) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = renderer.domElement.getBoundingClientRect();
            const x = (clientX - rect.left) * (WORLD_W / rect.width);
            currentPuni.x = Math.max(70, Math.min(330, x));
            currentPuni.visual.position.x = currentPuni.x;
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mouseup', drop);
        window.addEventListener('touchend', drop);

        prepareNext();
        animate();
    </script>
</body>
</html>
